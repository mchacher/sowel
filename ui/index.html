<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#1A4F6E" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Sowel" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@700;800&display=swap" rel="stylesheet" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/apple-touch-icon-180x180.png?v=3" />
    <title>Sowel</title>
  </head>
  <body>
    <div id="root"></div>

    <!-- PWA splash screen — visible until React mounts -->
    <div id="splash" data-ts="" style="position:fixed;inset:0;display:flex;align-items:center;justify-content:center;background:#F8F9FA;z-index:9999;transition:opacity .4s ease-out">
      <style>.dark #splash{background:#1a1a2e}</style>
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="25 15 150 190" width="180" height="234" fill="none">
        <path d="M100 30 L160 90 Q165 95 160 100 L160 150 Q160 158 152 158 L48 158 Q40 158 40 150 L40 100 Q35 95 40 90 Z" fill="none" stroke="#1A4F6E" stroke-width="8" stroke-linejoin="round" stroke-linecap="round"/>
        <path d="M75 115 Q100 140 125 115" fill="none" stroke="#7FB8D4" stroke-width="6" stroke-linecap="round"/>
        <path d="M78 95 Q83 87 88 95" fill="none" stroke="#7FB8D4" stroke-width="5" stroke-linecap="round"/>
        <g transform="translate(117, 91)">
          <animateTransform attributeName="transform" additive="sum" type="scale" values="1 1; 1 1; 1 0.1; 1 1; 1 1" keyTimes="0; 0.35; 0.42; 0.49; 1" dur="1.2s" repeatCount="indefinite"/>
          <path d="M-5 4 Q0 -4 5 4" fill="none" stroke="#7FB8D4" stroke-width="5" stroke-linecap="round"/>
        </g>
        <text x="100" y="195" text-anchor="middle" font-family="Nunito,sans-serif" font-weight="800" font-size="24" fill="#1A4F6E" letter-spacing="4">SOWEL</text>
      </svg>
    </div>

    <script>document.getElementById('splash').dataset.ts=Date.now();</script>
    <script>
      // One-time: unregister stale service workers and clear caches
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.getRegistrations().then(function(regs) {
          regs.forEach(function(r) { r.unregister(); });
        });
      }
      if ('caches' in window) {
        caches.keys().then(function(names) {
          names.forEach(function(name) { caches.delete(name); });
        });
      }
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
