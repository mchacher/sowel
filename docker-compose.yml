# ============================================================
# Sowel — Production deployment
# Usage: docker compose up -d
# ============================================================

services:
  sowel:
    image: ghcr.io/mchacher/sowel:latest
    container_name: sowel
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - INFLUX_URL=http://influxdb:8086
      - INFLUX_TOKEN=sowel-auto-token
      - INFLUX_ORG=sowel
      - INFLUX_BUCKET=sowel
    volumes:
      - sowel-data:/app/data
      - sowel-plugins:/app/plugins
      - /var/run/docker.sock:/var/run/docker.sock # self-update
    depends_on:
      - influxdb

  influxdb:
    image: influxdb:2.7
    container_name: sowel-influxdb
    restart: unless-stopped
    volumes:
      - influxdb-data:/var/lib/influxdb2
    environment:
      - DOCKER_INFLUXDB_INIT_MODE=setup
      - DOCKER_INFLUXDB_INIT_USERNAME=sowel
      - DOCKER_INFLUXDB_INIT_PASSWORD=sowel-auto-password
      - DOCKER_INFLUXDB_INIT_ORG=sowel
      - DOCKER_INFLUXDB_INIT_BUCKET=sowel
      - DOCKER_INFLUXDB_INIT_ADMIN_TOKEN=sowel-auto-token

volumes:
  sowel-data:
  sowel-plugins:
  influxdb-data:
