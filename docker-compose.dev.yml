# ============================================================
# Sowel — Development (local build)
# Usage: docker compose -f docker-compose.dev.yml up -d --build
# ============================================================

services:
  sowel:
    build: .
    container_name: sowel-dev
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - INFLUX_URL=http://influxdb:8086
      - INFLUX_TOKEN=sowel-dev-token
      - INFLUX_ORG=sowel
      - INFLUX_BUCKET=sowel
    volumes:
      - sowel-data:/app/data
      - sowel-plugins:/app/plugins
    depends_on:
      - influxdb

  influxdb:
    image: influxdb:2.7
    container_name: sowel-influxdb-dev
    restart: unless-stopped
    ports:
      - "8086:8086"
    volumes:
      - influxdb-data:/var/lib/influxdb2
    environment:
      - DOCKER_INFLUXDB_INIT_MODE=setup
      - DOCKER_INFLUXDB_INIT_USERNAME=sowel
      - DOCKER_INFLUXDB_INIT_PASSWORD=sowel-dev-password
      - DOCKER_INFLUXDB_INIT_ORG=sowel
      - DOCKER_INFLUXDB_INIT_BUCKET=sowel
      - DOCKER_INFLUXDB_INIT_ADMIN_TOKEN=sowel-dev-token

volumes:
  sowel-data:
  sowel-plugins:
  influxdb-data:
